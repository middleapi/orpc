services:
  postgres:
    image: postgres:17-alpine
    container_name: base-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: base
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d base']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
