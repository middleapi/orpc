packages:
  - 'apps/*'
  - 'packages/*'
  - 'playgrounds/*'
overrides:
  '@wxt-dev/storage': 1.2.0
  typescript: ~5.8.3

preferWorkspacePackages: true
linkWorkspacePackages: true
shamefullyHoist: true
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@swc/core': true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  simple-git-hooks: true
  spawn-sync: true
  vue-demi: true
  workerd: true
